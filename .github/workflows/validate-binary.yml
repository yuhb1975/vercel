name: Validate Binary

on:
  pull_request:
    paths:
      - 'packages/cli/package.json'
      - 'packages/cli/pkg.js'
      - 'packages/cli/pkg.config.mjs'
      - 'packages/cli/scripts/build-binary.mjs'
      - 'packages/cli/scripts/build-binary-node.mjs'
      - 'packages/cli/scripts/patch-node-source.mjs'
      - 'packages/vc-native/**'
      - '.github/workflows/validate-binary.yml'
      - '.github/workflows/release-binary.yml'
      - 'turbo.node-runtime.json'
  workflow_dispatch:

concurrency:
  group: validate-binary-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: node24.14.1-linux-x64
            asset: vercel-linux-x64
            ext: ''
            custom_node_path: .node-runtime/node-v24.14.1-linux-x64-small-icu/bin/node
            custom_node_platform: linux
            custom_node_arch: x64
          # Node 24.14.1 does not build with Clang 22 on the VS 2026 image.
          # Keep this aligned with the Windows runner in release-binary.yml.
          - runner: windows-2022
            target: node24.14.1-win-x64
            asset: vercel-windows-x64
            ext: '.exe'
            custom_node_path: .node-runtime/node-v24.14.1-win-x64-small-icu/node.exe
            custom_node_platform: win
            custom_node_arch: x64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.1
          package-manager-cache: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          toolchain: stable
          targets: wasm32-wasip2

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: 'pyproject.toml'

      - name: Install uv
        uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
        with:
          enable-cache: false

      - name: Install pnpm
        run: npm i -g pnpm@10.29.3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Linux build tools
        if: ${{ matrix.custom_node_platform == 'linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Build workspace packages
        run: pnpm build
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Build custom Node runtime
        env:
          VERCEL_CLI_NODE_VERSION: 24.14.1
          VERCEL_CLI_NODE_PLATFORM: ${{ matrix.custom_node_platform }}
          VERCEL_CLI_NODE_ARCH: ${{ matrix.custom_node_arch }}
        run: pnpm turbo --no-update-notifier --root-turbo-json turbo.node-runtime.json run //#build-binary-node --output-logs=new-only

      - name: Build binary
        working-directory: packages/cli
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VERCEL_CLI_BINARY_NODE_PATH: ${{ matrix.custom_node_path }}
        run: node scripts/build-binary.mjs --target ${{ matrix.target }} --output ./dist-bin/${{ matrix.asset }}${{ matrix.ext }}

      - name: Smoke test binary version
        shell: bash
        working-directory: packages/cli
        run: |
          set -euo pipefail
          bin="dist-bin/${{ matrix.asset }}${{ matrix.ext }}"
          chmod +x "$bin" || true
          out=$(./"$bin" --version)
          echo "$out"
          test -n "$out"

      - name: Smoke test binary help
        shell: bash
        working-directory: packages/cli
        run: |
          set -euo pipefail
          bin="dist-bin/${{ matrix.asset }}${{ matrix.ext }}"
          ./"$bin" --help >/tmp/vercel-binary-help.txt 2>&1
          test -s /tmp/vercel-binary-help.txt

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}${{ matrix.ext }}
          path: packages/cli/dist-bin/${{ matrix.asset }}${{ matrix.ext }}
          retention-days: 3
          if-no-files-found: error

  shim:
    name: Native npm shim
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.1
          package-manager-cache: false

      - name: Install pnpm
        run: npm i -g pnpm@10.29.3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test shim
        run: pnpm --filter @vercel/vc-native test
