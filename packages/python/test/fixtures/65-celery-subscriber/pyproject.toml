[project]
name = "celery-subscriber"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "fastapi",
    "celery>=5.3.0",
    "vercel",
]

# Declares a background worker compiled into a queue-triggered Lambda alongside
# the FastAPI app. The topic must match the Celery queue published to below.
[tool.vercel.subscribers.celery-worker]
entrypoint = "worker:app"
topics = ["celery"]
